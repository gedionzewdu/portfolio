<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gedion Dev</title>
    <link rel="icon" id="favicon" href="https://raw.githubusercontent.com/gedionzewdu/portfolio/main/Gedion%20Dev%20Official%20Logo.png" />
    <script>
      (function() {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const size = 64;
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const radius = size * 0.2; // 20% radius for "curved" look
          ctx.beginPath();
          ctx.moveTo(radius, 0);
          ctx.lineTo(size - radius, 0);
          ctx.quadraticCurveTo(size, 0, size, radius);
          ctx.lineTo(size, size - radius);
          ctx.quadraticCurveTo(size, size, size - radius, size);
          ctx.lineTo(radius, size);
          ctx.quadraticCurveTo(0, size, 0, size - radius);
          ctx.lineTo(0, radius);
          ctx.quadraticCurveTo(0, 0, radius, 0);
          ctx.closePath();
          ctx.clip();
          
          ctx.drawImage(img, 0, 0, size, size);
          
          document.getElementById('favicon').href = canvas.toDataURL('image/png');
        };
        img.src = "https://raw.githubusercontent.com/gedionzewdu/portfolio/main/Gedion%20Dev%20Official%20Logo.png";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
